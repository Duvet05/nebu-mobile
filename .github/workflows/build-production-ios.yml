name: Build iOS

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      build_name:
        description: "Optional Flutter build name, for example 1.2.1"
        required: false
      build_number:
        description: "Optional Flutter build number, must increase for App Store uploads"
        required: false
      upload_to_app_store:
        description: "Upload to App Store / TestFlight"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

env:
  FLUTTER_VERSION: "3.41.7"
  IOS_BUILD_NUMBER_OFFSET: "1000"
  APP_STORE_UPLOAD: ${{ github.event.inputs.upload_to_app_store || (startsWith(github.ref, 'refs/tags/') && 'true' || 'false') }}
  APP_STORE_TEAM_ID: ${{ vars.APP_STORE_TEAM_ID || 'L7D2JCR89T' }}
  APP_STORE_BUNDLE_ID: ${{ vars.APP_STORE_BUNDLE_ID || 'com.nebu.nebuMobileFlutter' }}

jobs:
  build-ios:
    name: Build iOS and optional TestFlight upload
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Decode Firebase iOS config
        env:
          GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${GOOGLE_SERVICE_INFO_PLIST_BASE64}" ]; then
            echo "Missing GitHub secret GOOGLE_SERVICE_INFO_PLIST_BASE64" >&2
            exit 1
          fi
          printf '%s' "${GOOGLE_SERVICE_INFO_PLIST_BASE64}" | base64 --decode > ios/Runner/GoogleService-Info.plist

      - name: Patch Google Sign-In URL scheme
        run: |
          set -euo pipefail
          ios_client_id="$(/usr/libexec/PlistBuddy -c 'Print :CLIENT_ID' ios/Runner/GoogleService-Info.plist 2>/dev/null || true)"
          reversed_client_id="$(/usr/libexec/PlistBuddy -c 'Print :REVERSED_CLIENT_ID' ios/Runner/GoogleService-Info.plist 2>/dev/null || true)"
          if [ -z "${ios_client_id}" ]; then
            echo "GoogleService-Info.plist does not contain CLIENT_ID" >&2
            exit 1
          fi
          if [ -z "${reversed_client_id}" ]; then
            echo "GoogleService-Info.plist does not contain REVERSED_CLIENT_ID" >&2
            exit 1
          fi
          printf 'FIREBASE_IOS_CLIENT_ID=%s\n' "${ios_client_id}" >> "${GITHUB_ENV}"

          /usr/libexec/PlistBuddy -c 'Delete :CFBundleURLTypes' ios/Runner/Info.plist 2>/dev/null || true
          /usr/libexec/PlistBuddy -c 'Add :CFBundleURLTypes array' ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c 'Add :CFBundleURLTypes:0 dict' ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c 'Add :CFBundleURLTypes:0:CFBundleURLSchemes array' ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string ${reversed_client_id}" ios/Runner/Info.plist

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Resolve iOS build metadata
        env:
          INPUT_BUILD_NAME: ${{ github.event.inputs.build_name || '' }}
          INPUT_BUILD_NUMBER: ${{ github.event.inputs.build_number || '' }}
        run: |
          set -euo pipefail

          pubspec_version="$(awk '/^version:/ { print $2; exit }' pubspec.yaml)"
          default_build_name="${pubspec_version%%+*}"
          build_name="${INPUT_BUILD_NAME:-$default_build_name}"
          build_number="${INPUT_BUILD_NUMBER:-$((IOS_BUILD_NUMBER_OFFSET + GITHUB_RUN_NUMBER))}"

          if ! [[ "${build_number}" =~ ^[0-9]+$ ]] || [ "${build_number}" -le 0 ]; then
            echo "iOS build number must be a positive integer: ${build_number}" >&2
            exit 1
          fi

          {
            echo "BUILD_NAME=${build_name}"
            echo "BUILD_NUMBER=${build_number}"
          } >> "${GITHUB_ENV}"

          {
            echo "### iOS build"
            echo "- Build name: ${build_name}"
            echo "- Build number: ${build_number}"
            echo "- Upload to App Store Connect: ${APP_STORE_UPLOAD}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Setup signing keychain
        env:
          APP_STORE_DISTRIBUTION_P12_BASE64: ${{ secrets.APP_STORE_DISTRIBUTION_P12_BASE64 }}
          APP_STORE_DISTRIBUTION_P12_PASSWORD: ${{ secrets.APP_STORE_DISTRIBUTION_P12_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${APP_STORE_DISTRIBUTION_P12_BASE64}" ]; then
            echo "Missing GitHub secret APP_STORE_DISTRIBUTION_P12_BASE64" >&2
            exit 1
          fi
          if [ -z "${APP_STORE_DISTRIBUTION_P12_PASSWORD}" ]; then
            echo "Missing GitHub secret APP_STORE_DISTRIBUTION_P12_PASSWORD" >&2
            exit 1
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/ios-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          printf '%s' "${APP_STORE_DISTRIBUTION_P12_BASE64}" | base64 --decode > "$RUNNER_TEMP/ios_dist.p12"
          security import "$RUNNER_TEMP/ios_dist.p12" -k "$KEYCHAIN_PATH" -P "${APP_STORE_DISTRIBUTION_P12_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/security -A
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          APP_STORE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APP_STORE_PROVISIONING_PROFILE_BASE64 }}
          APP_STORE_PROVISIONING_PROFILE_NAME: ${{ vars.APP_STORE_PROVISIONING_PROFILE_NAME }}
        run: |
          set -euo pipefail
          if [ -z "${APP_STORE_PROVISIONING_PROFILE_BASE64}" ]; then
            echo "Missing GitHub secret APP_STORE_PROVISIONING_PROFILE_BASE64" >&2
            exit 1
          fi
          if [ -z "${APP_STORE_PROVISIONING_PROFILE_NAME}" ]; then
            echo "Missing GitHub var APP_STORE_PROVISIONING_PROFILE_NAME" >&2
            exit 1
          fi

          echo "${APP_STORE_PROVISIONING_PROFILE_BASE64}" | base64 -D -o "$RUNNER_TEMP/AppStore.mobileprovision"
          PROFILE_ID="$(grep -aEo '[0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}' "$RUNNER_TEMP/AppStore.mobileprovision" | head -1)"
          echo "Profile UUID: $PROFILE_ID"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$RUNNER_TEMP/AppStore.mobileprovision" \
            "$HOME/Library/MobileDevice/Provisioning Profiles/${PROFILE_ID}.mobileprovision"

          cat > ios/ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${APP_STORE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${APP_STORE_BUNDLE_ID}</key>
              <string>${APP_STORE_PROVISIONING_PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          PLIST

      - name: Build iOS IPA
        env:
          API_URL: ${{ vars.API_URL }}
          SERVER_URL: ${{ vars.SERVER_URL }}
          WS_URL: ${{ vars.WS_URL }}
          LIVEKIT_URL: ${{ vars.LIVEKIT_URL }}
          GOOGLE_WEB_CLIENT_ID: ${{ vars.GOOGLE_WEB_CLIENT_ID }}
          GOOGLE_IOS_CLIENT_ID: ${{ vars.GOOGLE_IOS_CLIENT_ID }}
          FACEBOOK_APP_ID: ${{ vars.FACEBOOK_APP_ID }}
        run: |
          set -euo pipefail
          ENV=production
          ENABLE_CRASH_REPORTING=true
          ENABLE_DEBUG_LOGS=false
          if [ -z "${GOOGLE_IOS_CLIENT_ID:-}" ] && [ -n "${FIREBASE_IOS_CLIENT_ID:-}" ]; then
            GOOGLE_IOS_CLIENT_ID="${FIREBASE_IOS_CLIENT_ID}"
          fi

          build_args=(ipa --release --export-options-plist ios/ExportOptions.plist)

          add_define() {
            local name="$1"
            local value="${!name:-}"
            if [ -n "${value}" ]; then
              build_args+=("--dart-define=${name}=${value}")
            fi
          }

          add_define ENV
          add_define ENABLE_CRASH_REPORTING
          add_define ENABLE_DEBUG_LOGS
          add_define API_URL
          add_define SERVER_URL
          add_define WS_URL
          add_define LIVEKIT_URL
          add_define GOOGLE_WEB_CLIENT_ID
          add_define GOOGLE_IOS_CLIENT_ID
          add_define FACEBOOK_APP_ID

          if [ -n "${BUILD_NAME}" ]; then
            build_args+=(--build-name="${BUILD_NAME}")
          fi
          if [ -n "${BUILD_NUMBER}" ]; then
            build_args+=(--build-number="${BUILD_NUMBER}")
          fi

          flutter build "${build_args[@]}"

      - name: Upload iOS IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-runner-ipa-${{ github.run_id }}
          path: build/ios/ipa/*.ipa
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

      - name: Prepare App Store Connect API key
        if: env.APP_STORE_UPLOAD == 'true'
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID || secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${APP_STORE_CONNECT_API_KEY_ID:-}" ] || [ -z "${APP_STORE_CONNECT_API_ISSUER_ID:-}" ] || [ -z "${APP_STORE_CONNECT_API_KEY_BASE64:-}" ]; then
            echo "Missing App Store Connect API key secrets" >&2
            exit 1
          fi

          API_KEY_DIR="$HOME/.private_keys"
          mkdir -p "$API_KEY_DIR"
          echo "${APP_STORE_CONNECT_API_KEY_BASE64}" | base64 -D -o "$API_KEY_DIR/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"

          {
            echo "APP_STORE_CONNECT_API_KEY_ID=${APP_STORE_CONNECT_API_KEY_ID}"
            echo "APP_STORE_CONNECT_API_ISSUER_ID=${APP_STORE_CONNECT_API_ISSUER_ID}"
            echo "APP_STORE_CONNECT_API_KEY_PATH=${API_KEY_DIR}"
          } >> "${GITHUB_ENV}"

      - name: Validate IPA with App Store Connect
        if: env.APP_STORE_UPLOAD == 'true'
        run: |
          set -euo pipefail
          IPA_PATH="$(find build/ios/ipa -name '*.ipa' -print -quit)"
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found in build/ios/ipa/" >&2
            exit 1
          fi

          xcrun altool \
            --validate-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "${APP_STORE_CONNECT_API_KEY_ID}" \
            --apiIssuer "${APP_STORE_CONNECT_API_ISSUER_ID}" \
            --apiKeyPath "$APP_STORE_CONNECT_API_KEY_PATH"

      - name: Upload IPA to App Store Connect
        if: env.APP_STORE_UPLOAD == 'true'
        run: |
          set -euo pipefail
          IPA_PATH="$(find build/ios/ipa -name '*.ipa' -print -quit)"
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found in build/ios/ipa/" >&2
            exit 1
          fi

          xcrun altool \
            --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "${APP_STORE_CONNECT_API_KEY_ID}" \
            --apiIssuer "${APP_STORE_CONNECT_API_ISSUER_ID}" \
            --apiKeyPath "$APP_STORE_CONNECT_API_KEY_PATH"

      - name: Skip iOS App Store publish
        if: env.APP_STORE_UPLOAD != 'true'
        run: |
          set -euo pipefail
          echo "APP_STORE_UPLOAD is '${APP_STORE_UPLOAD}'. Signed IPA artifact was created, but App Store Connect upload was skipped."
          echo "To upload to TestFlight/App Store Connect, run workflow_dispatch with upload_to_app_store=true or push a v*.*.* tag."

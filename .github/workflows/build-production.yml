name: Build & Publish Android

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      publish_to_play:
        description: "Publish the generated AAB to Google Play"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      play_track:
        description: "Google Play track: internal, alpha, beta, production, or a custom closed track"
        required: false
        default: "internal"
      release_status:
        description: "Google Play release status. Use COMPLETED to make internal builds available to testers."
        required: false
        default: "DRAFT"
      build_name:
        description: "Optional Flutter build name, for example 1.2.1"
        required: false
      build_number:
        description: "Optional Flutter build number, must increase for stores"
        required: false

env:
  FLUTTER_VERSION: "3.41.7"
  ANDROID_NDK_VERSION: "28.2.13676358"
  ANDROID_VERSION_CODE_OFFSET: "1000"
  PLAY_TRACK: ${{ github.event.inputs.play_track || 'internal' }}
  PLAY_RELEASE_STATUS: ${{ github.event.inputs.release_status || (startsWith(github.ref, 'refs/tags/') && 'COMPLETED' || 'DRAFT') }}

jobs:
  build-and-publish:
    name: Build AAB and optional Play publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Android SDK packages
        run: |
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/tools/bin:$PATH"
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager --install "platforms;android-36" "ndk;${ANDROID_NDK_VERSION}"

      - name: Decode Firebase Android config
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${GOOGLE_SERVICES_JSON_BASE64}" ]; then
            echo "Missing GitHub secret GOOGLE_SERVICES_JSON_BASE64" >&2
            exit 1
          fi
          printf '%s' "${GOOGLE_SERVICES_JSON_BASE64}" | base64 --decode > android/app/google-services.json

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Resolve Android build metadata
        env:
          INPUT_BUILD_NAME: ${{ github.event.inputs.build_name || '' }}
          INPUT_BUILD_NUMBER: ${{ github.event.inputs.build_number || '' }}
        run: |
          set -euo pipefail

          pubspec_version="$(awk '/^version:/ { print $2; exit }' pubspec.yaml)"
          default_build_name="${pubspec_version%%+*}"
          build_name="${INPUT_BUILD_NAME:-$default_build_name}"
          build_number="${INPUT_BUILD_NUMBER:-$((ANDROID_VERSION_CODE_OFFSET + GITHUB_RUN_NUMBER))}"

          if ! [[ "${build_number}" =~ ^[0-9]+$ ]] || [ "${build_number}" -le 0 ]; then
            echo "Android build number must be a positive integer: ${build_number}" >&2
            exit 1
          fi

          {
            echo "BUILD_NAME=${build_name}"
            echo "BUILD_NUMBER=${build_number}"
          } >> "${GITHUB_ENV}"

          {
            echo "### Android build"
            echo "- Build name: ${build_name}"
            echo "- Build number: ${build_number}"
            echo "- Play track: ${PLAY_TRACK}"
            echo "- Play release status: ${PLAY_RELEASE_STATUS}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Decode keystore
        env:
          UPLOAD_KEYSTORE_BASE64: ${{ secrets.UPLOAD_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${UPLOAD_KEYSTORE_BASE64}" ]; then
            echo "Missing GitHub secret UPLOAD_KEYSTORE_BASE64" >&2
            exit 1
          fi
          printf '%s' "${UPLOAD_KEYSTORE_BASE64}" | base64 --decode > android/upload-keystore.jks

      - name: Create key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          set -euo pipefail
          if [ -z "${KEYSTORE_PASSWORD}" ] || [ -z "${KEY_PASSWORD}" ] || [ -z "${KEY_ALIAS}" ]; then
            echo "Missing one of KEYSTORE_PASSWORD, KEY_PASSWORD, KEY_ALIAS" >&2
            exit 1
          fi
          printf '%s\n' \
            "storePassword=${KEYSTORE_PASSWORD}" \
            "keyPassword=${KEY_PASSWORD}" \
            "keyAlias=${KEY_ALIAS}" \
            "storeFile=../upload-keystore.jks" \
            > android/key.properties

      - name: Build AAB
        env:
          API_URL: ${{ vars.API_URL }}
          SERVER_URL: ${{ vars.SERVER_URL }}
          WS_URL: ${{ vars.WS_URL }}
          LIVEKIT_URL: ${{ vars.LIVEKIT_URL }}
          GOOGLE_WEB_CLIENT_ID: ${{ vars.GOOGLE_WEB_CLIENT_ID }}
          GOOGLE_IOS_CLIENT_ID: ${{ vars.GOOGLE_IOS_CLIENT_ID }}
          FACEBOOK_APP_ID: ${{ vars.FACEBOOK_APP_ID }}
        run: |
          set -euo pipefail
          ENV=production
          ENABLE_CRASH_REPORTING=true
          ENABLE_DEBUG_LOGS=false

          build_args=(--release)
          encoded_defines=()

          add_define() {
            local name="$1"
            local value="${!name:-}"
            if [ -n "${value}" ]; then
              build_args+=("--dart-define=${name}=${value}")
              encoded_defines+=("$(printf '%s' "${name}=${value}" | base64 -w0)")
            fi
          }

          add_define ENV
          add_define ENABLE_CRASH_REPORTING
          add_define ENABLE_DEBUG_LOGS
          add_define API_URL
          add_define SERVER_URL
          add_define WS_URL
          add_define LIVEKIT_URL
          add_define GOOGLE_WEB_CLIENT_ID
          add_define GOOGLE_IOS_CLIENT_ID
          add_define FACEBOOK_APP_ID

          if [ -n "${BUILD_NAME}" ]; then
            build_args+=(--build-name="${BUILD_NAME}")
          fi
          if [ -n "${BUILD_NUMBER}" ]; then
            build_args+=(--build-number="${BUILD_NUMBER}")
          fi

          dart_defines="$(IFS=,; printf '%s' "${encoded_defines[*]}")"
          printf 'DART_DEFINES=%s\n' "${dart_defines}" >> "${GITHUB_ENV}"

          flutter build appbundle "${build_args[@]}"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab-${{ github.run_id }}
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          compression-level: 0
          retention-days: 30

      - name: Decode Play Store service account
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.publish_to_play == 'true'
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          if [ -z "${PLAY_SERVICE_ACCOUNT_JSON}" ]; then
            echo "Missing GitHub secret PLAY_SERVICE_ACCOUNT_JSON" >&2
            exit 1
          fi
          printf '%s' "${PLAY_SERVICE_ACCOUNT_JSON}" > android/service-account.json

      - name: Publish to Play Store
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.publish_to_play == 'true'
        run: cd android && ./gradlew publishReleaseBundle -Pdart-defines="${DART_DEFINES}"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/bundle/release/app-release.aab
          generate_release_notes: true
          draft: false

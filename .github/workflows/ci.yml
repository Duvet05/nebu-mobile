name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.41.7"
  ANDROID_NDK_VERSION: "28.2.13676358"

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

  android-debug:
    name: Android debug build
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager --install "platforms;android-36" "ndk;${ANDROID_NDK_VERSION}"

      - name: Write debug Firebase config
        run: |
          mkdir -p android/app/src/debug
          cat > android/app/src/debug/google-services.json <<'JSON'
          {
            "project_info": {
              "project_number": "123456789012",
              "project_id": "nebu-debug",
              "storage_bucket": "nebu-debug.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:123456789012:android:0000000000000000000000",
                  "android_client_info": {
                    "package_name": "com.nebu.mobile"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "debug-placeholder-key"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          JSON

      - name: Install dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

  android-e2e:
    name: Android e2e
    runs-on: ubuntu-latest
    needs: android-debug
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager --install "platforms;android-36" "ndk;${ANDROID_NDK_VERSION}"

      - name: Write debug Firebase config
        run: |
          mkdir -p android/app/src/debug
          cat > android/app/src/debug/google-services.json <<'JSON'
          {
            "project_info": {
              "project_number": "123456789012",
              "project_id": "nebu-debug",
              "storage_bucket": "nebu-debug.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:123456789012:android:0000000000000000000000",
                  "android_client_info": {
                    "package_name": "com.nebu.mobile"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "debug-placeholder-key"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          JSON

      - name: Install dependencies
        run: flutter pub get

      - name: Run social login e2e
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: flutter test integration_test/social_login_e2e_test.dart -d emulator-5554

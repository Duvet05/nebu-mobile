plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
    id "com.google.firebase.crashlytics"
    id "com.github.triplet.play" version "3.10.1"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace = "com.example.nebu_mobile_flutter"
    compileSdk = 36
    ndkVersion = "28.2.13676358"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId = "com.nebu.mobile"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName

    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    doFirst {
        def registrant = file("src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java")
        if (!registrant.exists()) {
            return
        }

        def directLiveKitRegistration = "flutterEngine.getPlugins().add(new io.livekit.plugin.LiveKitPlugin());"
        def reflectiveLiveKitRegistration = """flutterEngine.getPlugins().add(
        (io.flutter.embedding.engine.plugins.FlutterPlugin) Class.forName("io.livekit.plugin.LiveKitPlugin")
          .getDeclaredConstructor()
          .newInstance());"""

        def contents = registrant.text
        if (contents.contains(directLiveKitRegistration)) {
            registrant.text = contents.replace(directLiveKitRegistration, reflectiveLiveKitRegistration)
        }
    }
}

play {
    // Configuración de Google Play Publisher
    serviceAccountCredentials = file("../service-account.json")
    track = System.getenv("PLAY_TRACK") ?: "internal"
    defaultToAppBundles = true
    // DRAFT = Requiere revisión manual en Play Console
    // COMPLETED = Se publica automáticamente a testers
    releaseStatus = com.github.triplet.gradle.androidpublisher.ReleaseStatus.valueOf(
            System.getenv("PLAY_RELEASE_STATUS") ?: "DRAFT"
    )
}

flutter {
    source = "../.."
}
